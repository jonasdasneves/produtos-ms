<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{produtos.page.title}">Produtos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900">
<div class="max-w-4xl mx-auto p-4">

    <div th:replace="~{fragments.html :: navbar}"></div>

    <div class="bg-white p-4 mt-4 shadow-md rounded-md">
        <main class="flex flex-col items-center py-12">
            <!-- Ícone de caixa vazia -->
            <svg class="w-24 h-24 text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
            </svg>

            <p class="text-xl font-semibold text-gray-700 mb-2" th:text="#{produtos.lista.vazia}">Nenhum produto cadastrado</p>
            <p class="text-gray-500 mb-6 text-center" th:text="#{produtos.vazio.descricao}">
                Você ainda não possui produtos cadastrados no sistema.<br>Comece cadastrando seu primeiro produto!
            </p>

            <a th:href="@{/produtos/novo}"
               class="px-4 py-2 bg-yellow-400 text-gray-900 font-semibold rounded hover:bg-yellow-500 transition"
               th:text="#{produtos.novo}">Cadastrar Produto</a>
        </main>
    </div>

</div>
</body>
</html>
