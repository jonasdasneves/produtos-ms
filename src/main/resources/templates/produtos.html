<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{title}">Produtos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900">
<div class="max-w-4xl mx-auto p-4">

    <div th:replace="~{fragments.html :: navbar}"></div>

    <div class="bg-white p-4 mt-4 shadow-md rounded-md">
        <!-- Título da página -->
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-gray-800" th:text="#{produtos.lista}"></h1>
            <p class="text-gray-500">Confira os produtos disponíveis</p>
        </div>

        <!-- Listagem de produtos -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <ul>
                <li th:each="produto : ${produtos}">
                    <div class="bg-gray-50 border border-gray-200 rounded-lg p-4 hover:shadow-lg transition-shadow">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="font-bold text-gray-800" th:text="${produto.nome}">Notebook Dell Inspiron 15</h3>
                            <span class="px-2 py-1 text-xs font-semibold bg-green-100 text-green-700 rounded">NOVO</span>
                        </div>
                        <p class="text-gray-500 text-sm mb-4" th:text="${produto.descricao}">
                            Notebook com processador Intel Core i7, 16 GB RAM e SSD de 512 GB.
                        </p>
                        <div class="flex justify-between items-center">
                            <span class="text-lg font-bold text-gray-900"th:text="${produto.preco}">R$ 4.299,99</span>
                            <a th:href="${'produtos/' + produto.id}" class="px-3 py-1.5 text-sm border border-gray-400 rounded hover:bg-gray-200 transition">
                                Ver Detalhes
                            </a>
                        </div>
                    </div>
                </li>
            </ul>
        </div>
    </div>

</div>
</body>
</html>
