spring.application.name=produtos-ms

server.port=8082

# Banco de dados (MySQL via Docker Compose)
spring.datasource.url=jdbc:mysql://localhost:3307/produtosdb
spring.datasource.username=root
spring.datasource.password=root

# JPA: update cria/atualiza tabelas automaticamente conforme as entidades
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Necessario para que o Thymeleaf processe forms com method="put"/"delete" via _method
spring.mvc.hiddenmethod.filter.enabled=true

spring.security.oauth2.client.registration.github.client-id=${OUATH_PRODUTOS_MS_CLIENT_ID_GIT}
spring.security.oauth2.client.registration.github.client-secret=${OUATH_PRODUTOS_MS_SECRET_ID_GIT}
spring.security.oauth2.client.registration.github.scope[0]=public_repo


spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

#  Actuator
# Endpoints exigidos pelo CP5
management.endpoints.web.exposure.include=health,info,metrics,httpexchanges,prometheus
management.endpoint.health.show-details=always
# Tag all metrics with the application name for easier filtering in Grafana
management.metrics.tags.application=${spring.application.name}

# Informacoes exibidas em /actuator/info
info.app.name=produtos-ms
info.app.description=CP5 Java Advanced - Outbox Pattern e Observabilidade
info.app.version=0.0.1-SNAPSHOT
info.cp5.vendas-ms.repo=https://github.com/jonasdasneves/vendas-ms.git
info.cp5.evidencia.zipkin=evidencias/zipkin-trace-completo.png

#  Zipkin (distributed tracing)
# Send 100% of traces to Zipkin (reduce to e.g. 0.1 in production)
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

#  Spring Boot Admin Client
# URL of the Spring Boot Admin server (running via Docker Compose on port 8081)
#  ActiveMQ
spring.activemq.broker-url=tcp://localhost:61616
spring.activemq.user=admin
spring.activemq.password=admin

#  Spring Boot Admin Client
spring.boot.admin.client.url=http://localhost:8081
# Base URL that the Admin server (running inside Docker) uses to reach this service's actuator.
# Must use host.docker.internal so Docker can resolve the host machine's address.
spring.boot.admin.client.instance.service-base-url=http://host.docker.internal:8080