<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:if="${produto.id != null}"  th:text="#{produto.form.editar.page.title}">Editar Produto</title>
    <title th:unless="${produto.id != null}" th:text="#{produto.form.novo.page.title}">Novo Produto</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900">
<div class="max-w-4xl mx-auto p-4">

    <div th:replace="~{fragments.html :: navbar}"></div>

    <div class="bg-white p-6 mt-4 shadow-md rounded-md">

        <!-- Breadcrumb -->
        <nav class="mb-6">
            <ol class="flex items-center space-x-2 text-sm">
                <li>
                    <a href="/produtos" class="text-gray-500 hover:text-gray-700" th:text="#{produto.detalhes.breadcrumb}">Produtos</a>
                </li>
                <li class="text-gray-400">/</li>
                <li class="text-gray-800 font-medium">
                    <span th:if="${produto.id != null}"  th:text="#{produto.form.editar.page.title}">Editar Produto</span>
                    <span th:unless="${produto.id != null}" th:text="#{produto.form.breadcrumb.novo}">Novo Produto</span>
                </li>
            </ol>
        </nav>

        <!-- Título -->
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-gray-800">
                <span th:if="${produto.id != null}"  th:text="#{produto.form.editar.page.title}">Editar Produto</span>
                <span th:unless="${produto.id != null}" th:text="#{produto.form.novo.page.title}">Novo Produto</span>
            </h1>
            <p class="text-gray-500" th:text="#{produto.form.subtitulo}">Preencha as informações do produto</p>
        </div>

        <!-- Formulário -->
        <form th:action="@{/produtos/save}" method="post" th:object="${produto}" class="space-y-6">
            <input type="hidden" th:field="*{id}">

            <!-- Nome do Produto -->
            <div>
                <label for="nome" class="block text-sm font-medium text-gray-700 mb-1">
                    <span th:text="#{produto.form.nome}">Nome do Produto</span> <span class="text-red-500">*</span>
                </label>
                <input type="text" id="nome" name="nome" required
                       th:field="*{nome}"
                       class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-yellow-400 focus:border-transparent transition"
                       th:placeholder="#{produto.form.placeholder.nome}">
            </div>

            <!-- Descrição -->
            <div>
                <label for="descricao" class="block text-sm font-medium text-gray-700 mb-1">
                    <span th:text="#{produto.form.descricao}">Descrição</span> <span class="text-red-500">*</span>
                </label>
                <textarea id="descricao" name="descricao" rows="4" required
                          th:field="*{descricao}"
                          class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-yellow-400 focus:border-transparent transition resize-none"
                          th:placeholder="#{produto.form.placeholder.descricao}"></textarea>
            </div>

            <!-- Preço e Categoria (lado a lado) -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                <!-- Preço -->
                <div>
                    <label for="preco" class="block text-sm font-medium text-gray-700 mb-1">
                        <span th:text="#{produto.form.preco}">Preço</span> <span class="text-red-500">*</span>
                    </label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-500">R$</span>
                        <input type="number" id="preco" name="preco" step="0.01" min="0" required
                               th:field="*{preco}"
                               class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-yellow-400 focus:border-transparent transition"
                               th:placeholder="#{produto.form.placeholder.preco}">
                    </div>
                </div>

                <!-- Categoria -->
                <div>
                    <label for="categoria" class="block text-sm font-medium text-gray-700 mb-1">
                        <span th:text="#{produto.form.categoria}">Categoria</span> <span class="text-red-500">*</span>
                    </label>
                    <select id="categoria" name="categoria" required
                            th:field="*{categoriaEnum}"
                            class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-yellow-400 focus:border-transparent transition bg-white">
                        <option value="" disabled th:text="#{produto.form.placeholder.categoria}">Selecione uma categoria</option>
                        <option value="NOVO"      th:text="#{categoria.NOVO}">Novo</option>
                        <option value="USADO"     th:text="#{categoria.USADO}">Usado</option>
                        <option value="REFORMADO" th:text="#{categoria.REFORMADO}">Reformado</option>
                    </select>
                </div>

            </div>

            <!-- Mensagem de erro (oculto por padrão) -->
            <div id="errorMessage" class="hidden bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-md">
                <div class="flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <span th:text="#{produto.form.erro.obrigatorio}">Por favor, preencha todos os campos obrigatórios.</span>
                </div>
            </div>

            <!-- Botões de ação -->
            <div class="flex flex-wrap gap-3 pt-4 border-t border-gray-200">
                <button type="submit" th:if="${produto.id != null}"
                        class="px-6 py-2 bg-yellow-400 text-gray-900 font-semibold rounded hover:bg-yellow-500 transition"
                        th:text="#{produto.form.atualizar}">Atualizar Produto</button>
                <button type="submit" th:unless="${produto.id != null}"
                        class="px-6 py-2 bg-yellow-400 text-gray-900 font-semibold rounded hover:bg-yellow-500 transition"
                        th:text="#{produto.form.salvar}">Salvar Produto</button>
                <a th:href="@{/produtos}"
                   class="px-6 py-2 border border-gray-400 text-gray-700 rounded hover:bg-gray-100 transition"
                   th:text="#{common.cancelar}">Cancelar</a>
            </div>

        </form>

    </div>

</div>
</body>
</html>
