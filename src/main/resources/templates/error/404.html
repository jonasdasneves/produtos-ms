<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{error.notfound.title}">Página não encontrada</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900">
<div class="max-w-4xl mx-auto p-4">

    <div th:replace="~{fragments.html :: navbar}"></div>

    <div class="bg-white p-4 mt-4 shadow-md rounded-md">
        <main class="flex flex-col items-center py-12">

            <svg class="w-24 h-24 text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                      d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>

            <p class="text-6xl font-bold text-gray-300 mb-4">404</p>
            <p class="text-xl font-semibold text-gray-700 mb-2" th:text="#{error.notfound.title}">Página não encontrada</p>
            <p class="text-gray-500 mb-6 text-center" th:text="#{error.notfound.message}">
                A página que você está procurando não existe ou foi removida.
            </p>
            <a th:href="@{/}" class="px-4 py-2 bg-yellow-400 text-gray-900 font-semibold rounded hover:bg-yellow-500 transition"
               th:text="#{error.notfound.back}">Voltar para início</a>

        </main>
    </div>

</div>
</body>
</html>
