<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fragments</title>
</head>
<body>

<!-- ===================== NAVBAR ===================== -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/">
            <span class="text-warning">&#9678;</span> ProdutosMS
        </a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarMain"
                aria-controls="navbarMain" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarMain">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" href="/produtos">Produtos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/produtos/novo">Cadastrar Produto</a>
                </li>
            </ul>

            <!-- User info -->
            <div class="d-flex align-items-center gap-3">
                <div class="dropdown">
                    <button class="btn btn-outline-light btn-sm dropdown-toggle d-flex align-items-center gap-2"
                            type="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <img src="https://ui-avatars.com/api/?name=João+Silva&background=ffc107&color=000&size=28"
                             class="rounded-circle" width="28" height="28" alt="Avatar">
                        João Silva
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><h6 class="dropdown-header">joao.silva@email.com</h6></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="/perfil">Meu Perfil</a></li>
                        <li><a class="dropdown-item text-danger" href="/logout">Sair</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</nav>

<!-- ===================== FOOTER ===================== -->
<footer th:fragment="footer" class="bg-dark text-secondary text-center py-3 mt-auto">
    <small>&copy; 2026 ProdutosMS &mdash; FIAP. Todos os direitos reservados.</small>
</footer>

<!-- ===================== HEAD (CSS/META) ===================== -->
<th:block th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title} + ' | ProdutosMS'">ProdutosMS</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .card-produto { transition: transform .2s, box-shadow .2s; }
        .card-produto:hover { transform: translateY(-4px); box-shadow: 0 6px 20px rgba(0,0,0,.12); }
        .badge-categoria { font-size: .75rem; }
    </style>
</th:block>

<!-- ===================== SCRIPTS ===================== -->
<th:block th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</th:block>

</body>
</html>
