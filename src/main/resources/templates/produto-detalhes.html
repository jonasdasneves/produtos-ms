<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{produto.detalhes.page.title}">Detalhes do Produto</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900">
<div class="max-w-4xl mx-auto p-4">

    <div th:replace="~{fragments.html :: navbar}"></div>

    <div class="bg-white p-4 mt-4 shadow-md rounded-md">
        <!-- Card de detalhes -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

            <!-- Coluna esquerda: imagem placeholder -->
            <div class="flex items-center justify-center">
                <div class="bg-gray-100 rounded-lg p-8 text-center w-full">
                    <svg class="w-20 h-20 mx-auto text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                    </svg>
                    <p class="text-gray-400 mt-3 text-sm" th:text="#{produto.imagem.indisponivel}">Imagem não disponível</p>
                </div>
            </div>

            <!-- Coluna direita: informações -->
            <div class="md:col-span-2">

                <!-- Nome e categoria -->
                <div class="flex items-center gap-3 mb-2">
                    <span class="px-2 py-1 text-xs font-semibold bg-green-100 text-green-700 rounded"
                          th:text="#{|categoria.${produto.categoriaEnum}|}"></span>
                    <span class="text-gray-400 text-sm" th:text="${produto.id}"></span>
                </div>
                <h1 class="text-2xl font-bold text-gray-800 mb-4" th:text="${produto.nome}">Nome do Produto</h1>

                <!-- Preço -->
                <div class="mb-6">
                    <span class="text-3xl font-bold text-gray-900" th:text="${produto.preco}">R$ 0,00</span>
                </div>

                <!-- Informações -->
                <div class="mb-6">
                    <h2 class="text-xs uppercase text-gray-500 font-semibold mb-2" th:text="#{common.informacoes}">Informações</h2>
                    <div class="bg-gray-50 rounded-lg p-4">
                        <div class="grid grid-cols-2 gap-3 text-sm">
                            <div>
                                <span class="text-gray-500" th:text="#{common.categoria}">Categoria</span>
                                <p class="font-medium text-gray-800" th:text="#{|categoria.${produto.categoriaEnum}|}">-</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Ações -->
                <div class="flex flex-wrap gap-3">
                    <a th:href="${'editar/' + produto.id}"
                       class="px-4 py-2 bg-yellow-400 text-gray-900 font-semibold rounded bg-yellow-500 transition"
                       th:text="#{produto.detalhes.acao.editar}">Editar</a>
                    <button type="button" id="btnExcluir"
                            class="px-4 py-2 border border-red-500 text-red-500 font-semibold rounded hover:bg-red-50 transition"
                            th:text="#{produto.detalhes.acao.excluir}">Excluir</button>
                    <a th:href="@{/produtos}"
                       class="px-4 py-2 border border-gray-400 text-gray-700 rounded bg-gray-100 transition"
                       th:text="#{produto.detalhes.acao.voltar}">Voltar</a>
                </div>

            </div>
        </div>
    </div>

    <!-- Modal de confirmação de exclusão -->
    <div id="modalExcluir" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-xl max-w-md w-full mx-4">
            <div class="p-6">
                <div class="flex items-center mb-4">
                    <svg class="w-6 h-6 text-red-500 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                    </svg>
                    <h3 class="text-lg font-bold text-gray-800" th:text="#{produto.excluir.modal.titulo}">Confirmar Exclusão</h3>
                </div>
                <p class="text-gray-600 mb-2"
                   th:text="${#messages.msg('produto.excluir.modal.mensagem', produto.nome)}">
                    Tem certeza que deseja excluir este produto?
                </p>
                <p class="text-gray-500 mb-6" th:text="#{produto.excluir.modal.alerta}">
                    Esta ação não pode ser desfeita.
                </p>
                <div class="flex justify-end gap-3">
                    <button type="button" id="btnCancelar"
                            class="px-4 py-2 border border-gray-300 text-gray-700 rounded hover:bg-gray-100 transition"
                            th:text="#{common.cancelar}">Cancelar</button>
                    <form th:action="@{/produtos/{id}(id=${produto.id})}" method="post" class="inline">
                        <input type="hidden" name="_method" value="DELETE">
                        <button type="submit"
                                class="px-4 py-2 bg-red-500 text-white font-semibold rounded hover:bg-red-600 transition"
                                th:text="#{produto.excluir.modal.confirmar}">Sim, excluir</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const modal = document.getElementById('modalExcluir');
    const btnExcluir = document.getElementById('btnExcluir');
    const btnCancelar = document.getElementById('btnCancelar');

    btnExcluir.addEventListener('click', () => {
        modal.classList.remove('hidden');
        modal.classList.add('flex');
    });

    btnCancelar.addEventListener('click', () => {
        modal.classList.add('hidden');
        modal.classList.remove('flex');
    });

    modal.addEventListener('click', (e) => {
        if (e.target === modal) {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }
    });
</script>
</body>
</html>
